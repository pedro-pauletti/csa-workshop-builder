<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" role="img" aria-label="Three-repo accelerator flow">
  <rect width="960" height="360" fill="#f7f9fc"/>
  <g font-family="Inter, sans-serif">
    <rect x="40" y="100" width="240" height="160" rx="10" fill="#1f3a93"/>
    <text x="160" y="142" font-size="16" fill="#fff" font-weight="700" text-anchor="middle">csa-workshop-builder</text>
    <text x="160" y="166" font-size="12" fill="#cfd8ff" text-anchor="middle">Tutorial</text>
    <text x="160" y="194" font-size="13" fill="#fff" text-anchor="middle">Method · prompts ·</text>
    <text x="160" y="212" font-size="13" fill="#fff" text-anchor="middle">templates · samples</text>
    <text x="160" y="240" font-size="11" fill="#cfd8ff" text-anchor="middle">Published to GitHub Pages</text>

    <rect x="360" y="100" width="240" height="160" rx="10" fill="#3949ab"/>
    <text x="480" y="142" font-size="16" fill="#fff" font-weight="700" text-anchor="middle">customer-workshop-</text>
    <text x="480" y="160" font-size="16" fill="#fff" font-weight="700" text-anchor="middle">app-template</text>
    <text x="480" y="184" font-size="12" fill="#cfd8ff" text-anchor="middle">Reusable app template</text>
    <text x="480" y="212" font-size="13" fill="#fff" text-anchor="middle">FastAPI · Jinja2 · Docker</text>
    <text x="480" y="240" font-size="11" fill="#cfd8ff" text-anchor="middle">Cloned per engagement</text>

    <rect x="680" y="100" width="240" height="160" rx="10" fill="#00838f"/>
    <text x="800" y="142" font-size="16" fill="#fff" font-weight="700" text-anchor="middle">&lt;customer&gt;-workshop</text>
    <text x="800" y="166" font-size="12" fill="#b2ebf2" text-anchor="middle">Customer-specific app</text>
    <text x="800" y="194" font-size="13" fill="#fff" text-anchor="middle">Scenario · agenda · demos</text>
    <text x="800" y="212" font-size="13" fill="#fff" text-anchor="middle">customized</text>
    <text x="800" y="240" font-size="11" fill="#b2ebf2" text-anchor="middle">Delivered locally / on Azure</text>

    <path d="M 280 180 L 360 180" stroke="#0b1530" stroke-width="2" fill="none" marker-end="url(#a1)"/>
    <path d="M 600 180 L 680 180" stroke="#0b1530" stroke-width="2" fill="none" marker-end="url(#a1)"/>

    <text x="320" y="170" font-size="11" fill="#0b1530" text-anchor="middle">guides</text>
    <text x="640" y="170" font-size="11" fill="#0b1530" text-anchor="middle">clones</text>

    <text x="480" y="50" font-size="18" fill="#0b1530" font-weight="700" text-anchor="middle">Accelerator flow</text>
    <text x="480" y="72" font-size="12" fill="#54607a" text-anchor="middle">Tutorial → Template → Customer-specific workshop app</text>

    <text x="480" y="320" font-size="11" fill="#54607a" text-anchor="middle">Promote good edits back into the template; promote stable improvements into the tutorial.</text>
  </g>
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#0b1530"/>
    </marker>
  </defs>
</svg>
