site_name: How CSAs create engaging workshops tailored to customer use cases
site_description: An accelerator for generating customer-specific interactive workshop web apps with GitHub Copilot
site_url: https://pedro-pauletti.github.io/csa-workshop-builder/

repo_name: pedro-pauletti/csa-workshop-builder
repo_url: https://github.com/pedro-pauletti/csa-workshop-builder
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - scheme: default
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: pink
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

extra_css:
  - stylesheets/extra.css

nav:
  - Introduction: index.md
  - Live demo ↗: https://pedro-pauletti.github.io/csa-workshop-builder/demo/
  - Fast path — generate your first workshop app: 00-fast-path.md
  - Build Northwind MemberAssist end-to-end:
    - 1. Accelerator pattern: 02-design-principles.md
    - 2. Customer scenario (Northwind): 03-customer-scenario.md
    - 3. SKILL.md for Northwind: 04-create-skill.md
    - 4. agenda.md for Northwind: 05-create-agenda.md
    - 5. Plan with Copilot: 06-copilot-plan.md
    - 6. Generate the web app: 07-generate-web-app.md
    - 7. Run locally: 11-run-locally.md
    - 8. Explanatory sections: 08-explanatory-sections.md
    - 9. Interactive demos (mocked): 09-interactive-demos.md
    - 10. Visual identity & theme: 10-customization-patterns.md
    - 11. Publish with GitHub Pages: 12-publish-github-pages.md
    - 12. Validation & polish: 12-validation-polish.md
  - 13. Customize for your customer or product: 13-customize.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: false
      line_spans: __codeline
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pedro-pauletti/csa-workshop-builder
