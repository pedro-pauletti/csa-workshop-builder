<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azure AI Search Workshop — Contoso Outdoor</title>
  <meta name="description" content="A workshop walking through Azure AI Search for an e-commerce catalog: indexing, vector & hybrid retrieval, semantic ranking, RAG, and evaluation." />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
  <script>
    // Avoid FOUC: read persisted theme + sidebar state before stylesheet evaluates
    (function () {
      try {
        var t = localStorage.getItem('csa-demo-theme');
        if (t === 'dark' || t === 'light') {
          document.documentElement.setAttribute('data-theme', t);
        }
        var s = localStorage.getItem('csa-demo-sidebar');
        if (s === 'collapsed') {
          document.documentElement.setAttribute('data-sidebar', 'collapsed');
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <aside class="sidebar" aria-label="Workshop navigation">
    <div class="sidebar__brand">
      <span class="sidebar__brand-mark"><i class="fa-solid fa-magnifying-glass"></i></span>
      <div class="sidebar__brand-text">
        <div class="sidebar__brand-title">Azure AI Search</div>
        <div class="sidebar__brand-sub">Workshop · Contoso Outdoor</div>
      </div>
      <button type="button" id="sidebarToggle" class="sidebar__toggle"
              aria-label="Toggle sidebar" aria-expanded="true" title="Collapse sidebar">
        <i class="fa-solid fa-angles-left"></i>
      </button>
    </div>

    <nav class="sidebar__nav" id="sidebarNav" aria-label="Sections"></nav>

    <div class="sidebar__footer">
      <button id="themeToggle" class="theme-toggle" title="Toggle light/dark">
        <i class="fa-solid fa-sun" aria-hidden="true"></i>
        <span>Theme</span>
      </button>
      <a href="../" class="back-to-tutorial" title="Back to the tutorial">
        <i class="fa-solid fa-book-open-reader"></i>
        <span>Back to tutorial</span>
      </a>
    </div>
  </aside>

  <main id="main" class="main">
    <div class="main__topbar">
      <div class="topbar__breadcrumb">
        <i class="fa-solid fa-layer-group"></i>
        <span id="crumbSection">Welcome</span>
      </div>
      <span class="topbar__pill">
        <i class="fa-solid fa-flask-vial"></i> Mock data · for learning
      </span>
    </div>

    <div id="sectionRoot" class="section-root" role="region" aria-live="polite">
      <!-- section content injected here -->
    </div>

    <footer class="main__footer">
      <span>Built from <a href="../">csa-workshop-builder</a>.</span>
    </footer>
  </main>

  <script src="js/app.js" defer></script>
</body>
</html>
